<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FIFA World Cup 2026</title>
	<link rel="stylesheet" type="text/css" href="./css/base.css">
	<!-- <link rel="stylesheet" type="text/css" href="./css/visualization.css"> -->
</head>
<body>
	<div class="normal-container">
		<h1>Where do World Cup 2026 players play in?</h1>

	</div>
	<div class="panel-container">
		<div class="explanation-panel">
			<div class="sort-container"></div>
			<div class="age-container"></div>
			<div class="big-five-container"></div>
			<div class="play-local-container"></div>

		</div>
		<div class="legend-panel">
			<div class="instruction-interaction">Click on the label below to highlight the players with corresponding characteristics. </div>
			<div class="instruction-interaction"> To multi-select, press Shift while clicking, to de-select, press control while clicking.</div>
			<div class="instruction-interaction">Click <span id="show-all-button">Show all</span>to reset.</div>
		</div>
		<div class="plot-grid-container">
		</div>

	</div>
	<!-- Load javascripts -->
	<script src="./javascripts/d3.v7.js"></script>
	<script src="./javascripts/colorPlayIn.js"></script>

    <script src="./javascripts/shared-constants.js"></script>

	<script src="./javascripts/legend_play_in.js"></script>
	<script src="./javascripts/legendAll.js"></script>

	<script src="./javascripts/toolTips.js"></script>
	<script src="./javascripts/legendInteraction.js"></script>
	<script src="./javascripts/sort_by_heterogenity.js"></script> 
	<script src="./javascripts/sort_by_age.js"></script> 
	<script src="./javascripts/showBigFive.js"></script>
